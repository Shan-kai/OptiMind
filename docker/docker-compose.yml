version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPTI_MIND_ENV=local
    volumes:
      - ../config:/app/config:ro
      - ../tests/fixtures:/app/tests/fixtures:ro

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - OPTI_MIND_ENV=local
      - API_BASE_URL=http://app:8000/api/v1
    volumes:
      - ../config:/app/config:ro
      - ../tests/fixtures:/app/tests/fixtures:ro
    command: ["streamlit", "run", "dashboard/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
